name: 🚀 CI Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Linting
        run: npm run lint

      - name: 🏗️ Type Checking
        run: npm run type-check || echo "Skipping type check if script not found"

      - name: 🏗️ Production Build
        run: npm run build
